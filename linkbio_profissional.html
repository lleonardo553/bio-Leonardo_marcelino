<html lang="pt-BR">
<head>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --secondary: #ec4899;
      --accent: #06b6d4;
      --dark: #0f0f0f;
      --card: rgba(255, 255, 255, 0.03);
      --card-hover: rgba(255, 255, 255, 0.08);
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.1);
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.15);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: var(--dark);
      color: var(--text);
      overflow-x: hidden;
      position: relative;
    }

    /* Animated Background */
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
    }

    .bg-animation::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: 
        radial-gradient(circle at 20% 80%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(236, 72, 153, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(6, 182, 212, 0.05) 0%, transparent 50%);
      animation: bgFloat 20s ease-in-out infinite;
    }

    @keyframes bgFloat {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(30px, -30px) rotate(1deg); }
      66% { transform: translate(-20px, 20px) rotate(-1deg); }
    }

    /* Noise Texture Overlay */
    .noise-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0.03;
      z-index: 1;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    /* Main Container */
    .container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding: 40px 24px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Profile Section */
    .profile {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeInUp 0.8s ease-out;
    }

    .profile-image-wrapper {
      position: relative;
      display: inline-block;
      margin-bottom: 20px;
    }

    .profile-image-wrapper::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 24px;
      background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
      animation: rotate 4s linear infinite;
      opacity: 0.8;
    }

    .profile-image-wrapper::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 24px;
      background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
      filter: blur(12px);
      opacity: 0.4;
      animation: rotate 4s linear infinite;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .profile img {
      position: relative;
      width: 140px;
      height: 140px;
      border-radius: 20px;
      object-fit: cover;
      border: 3px solid var(--dark);
      z-index: 2;
      transition: transform 0.3s ease;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    .profile img:hover {
      transform: scale(1.05);
    }

    .verified-badge {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: var(--primary);
      color: white;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      border: 3px solid var(--dark);
      z-index: 3;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7); }
      50% { box-shadow: 0 0 0 8px rgba(99, 102, 241, 0); }
    }

    .profile h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #fff 0%, #c7c7c7 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .profile .subtitle {
      font-size: 15px;
      color: var(--text-muted);
      font-weight: 400;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .profile .subtitle i {
      color: var(--secondary);
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 16px;
    }

    .stat-item {
      text-align: center;
    }

    .stat-value {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Social Links */
    .social-bar {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 32px;
      animation: fadeInUp 0.8s ease-out 0.2s both;
    }

    .social-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 18px;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .social-icon::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .social-icon:hover {
      transform: translateY(-4px);
      border-color: transparent;
      color: white;
      box-shadow: var(--shadow-glow);
    }

    .social-icon:hover::before {
      opacity: 1;
    }

    .social-icon i {
      position: relative;
      z-index: 1;
    }

    /* Links Section */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 32px;
    }

    .link-card {
      position: relative;
      display: flex;
      align-items: center;
      padding: 16px 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      text-decoration: none;
      color: var(--text);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
      animation: fadeInUp 0.6s ease-out both;
    }

    .link-card:nth-child(1) { animation-delay: 0.1s; }
    .link-card:nth-child(2) { animation-delay: 0.2s; }
    .link-card:nth-child(3) { animation-delay: 0.3s; }

    .link-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 4px;
      background: linear-gradient(to bottom, var(--primary), var(--secondary));
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .link-card:hover {
      background: var(--card-hover);
      transform: translateX(8px);
      border-color: rgba(99, 102, 241, 0.3);
      box-shadow: var(--shadow);
    }

    .link-card:hover::before {
      opacity: 1;
    }

    .link-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      margin-right: 16px;
      flex-shrink: 0;
      transition: transform 0.3s ease;
    }

    .link-card:hover .link-icon {
      transform: scale(1.1) rotate(-5deg);
    }

    .link-icon.youtube { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
    .link-icon.tiktok { background: rgba(236, 72, 153, 0.1); color: #ec4899; }
    .link-icon.instagram { background: rgba(249, 115, 22, 0.1); color: #f97316; }

    .link-content {
      flex: 1;
      text-align: left;
    }

    .link-title {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 16px;
      margin-bottom: 2px;
    }

    .link-desc {
      font-size: 13px;
      color: var(--text-muted);
    }

    .link-arrow {
      color: var(--text-muted);
      font-size: 14px;
      transition: all 0.3s ease;
    }

    .link-card:hover .link-arrow {
      color: var(--primary);
      transform: translateX(4px);
    }

    /* Ad Section */
    .ad-section {
      width: 100%;
      margin: 20px 0;
      animation: fadeInUp 0.8s ease-out 0.6s both;
    }

    .ad-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      text-align: center;
    }

    .ad-container {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      min-height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Footer */
    footer {
      margin-top: auto;
      padding-top: 32px;
      text-align: center;
      animation: fadeInUp 0.8s ease-out 0.8s both;
    }

    .footer-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .footer-logo i {
      color: var(--primary);
    }

    .footer-text {
      font-size: 12px;
      color: var(--text-muted);
      opacity: 0.6;
    }

    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--dark);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--primary);
    }

    /* Responsive */
    @media (max-width: 480px) {
      .container {
        padding: 24px 16px;
      }

      .profile h1 {
        font-size: 24px;
      }

      .link-card {
        padding: 14px 16px;
      }
    }

    /* Click Ripple Effect */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: scale(0);
      animation: ripple-animation 0.6s ease-out;
      pointer-events: none;
    }

    @keyframes ripple-animation {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }
  </style>

  <script>
    // AdSense
    (adsbygoogle = window.adsbygoogle || []).push({});

    // Ripple Effect
    function createRipple(event, element) {
      const ripple = document.createElement('span');
      const rect = element.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      const x = event.clientX - rect.left - size / 2;
      const y = event.clientY - rect.top - size / 2;

      ripple.style.width = ripple.style.height = size + 'px';
      ripple.style.left = x + 'px';
      ripple.style.top = y + 'px';
      ripple.classList.add('ripple');

      element.appendChild(ripple);

      setTimeout(() => ripple.remove(), 600);
    }

    // Track clicks analytics
